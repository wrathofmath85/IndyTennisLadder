<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Submission Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0d1d33;
      --bg3:#163253;
      --card:rgba(255,255,255,0.12);
      --border:rgba(255,255,255,0.18);
      --text:#f5f8ff;
      --muted:rgba(245,248,255,0.75);
      --accent:#8fd3ff;
      --accent-2:#c7f1ff;
      --success:#b8ffd4;
      --error:#ffd1d1;
      --shadow:0 30px 80px rgba(0,0,0,0.35);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      min-height:100%;
    }

    body{
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(143,211,255,0.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(199,241,255,0.12), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 18px;
      overflow-x:hidden;
    }

    .wrap{
      width:100%;
      max-width:720px;
    }

    .card{
      background:var(--card);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:34px;
    }

    /* ✅ NEW LOGO STYLING */
    .logo-wrap{
      text-align:center;
      margin-bottom:20px;
    }

    .logo-wrap img{
      max-width:220px;
      width:100%;
      height:auto;
      object-fit:contain;
      opacity:0.95;
    }

    .header{
      text-align:center;
      margin-bottom:28px;
    }

    .eyebrow{
      display:inline-block;
      font-size:12px;
      font-weight:700;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:var(--accent-2);
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.14);
      padding:8px 12px;
      border-radius:999px;
      margin-bottom:14px;
    }

    h1{
      font-size:clamp(30px, 4vw, 42px);
      line-height:1.05;
      margin-bottom:10px;
      font-weight:800;
    }

    .subtext{
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
      max-width:560px;
      margin:0 auto;
    }

    form{
      display:grid;
      gap:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:14px;
      font-weight:600;
      color:var(--text);
    }

    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:-2px;
    }

    input,
    select,
    textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:15px 16px;
      font:inherit;
      color:var(--text);
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.14);
      transition:border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    input::placeholder,
    textarea::placeholder{
      color:rgba(245,248,255,0.5);
    }

    select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      background-image:
        linear-gradient(45deg, transparent 50%, rgba(255,255,255,0.75) 50%),
        linear-gradient(135deg, rgba(255,255,255,0.75) 50%, transparent 50%);
      background-position:
        calc(100% - 20px) calc(50% - 3px),
        calc(100% - 14px) calc(50% - 3px);
      background-size:6px 6px, 6px 6px;
      background-repeat:no-repeat;
      padding-right:42px;
    }

    option{
      color:#111;
    }

    input:focus,
    select:focus,
    textarea:focus{
      border-color:rgba(143,211,255,0.7);
      background:rgba(255,255,255,0.14);
      transform:translateY(-1px);
    }

    textarea{
      min-height:130px;
      resize:vertical;
      line-height:1.55;
    }

    .hidden{
      display:none;
    }

    .submit-row{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:6px;
    }

    button{
      border:none;
      outline:none;
      border-radius:18px;
      padding:16px 20px;
      font:inherit;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      color:#072033;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 18px 40px rgba(143,211,255,0.28);
      transition:transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 45px rgba(143,211,255,0.34);
    }

    button:disabled{
      cursor:not-allowed;
      opacity:0.7;
      transform:none;
    }

    .status{
      min-height:24px;
      font-size:14px;
      font-weight:600;
      color:var(--muted);
    }

    .status.success{
      color:var(--success);
    }

    .status.error{
      color:var(--error);
    }

    .loading-wrap{
      display:none;
      align-items:center;
      gap:12px;
      color:var(--accent-2);
      font-size:14px;
      font-weight:700;
    }

    .loading-wrap.active{
      display:flex;
    }

    .spinner{
      width:18px;
      height:18px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,0.25);
      border-top-color:var(--accent-2);
      animation:spin 0.8s linear infinite;
      flex:0 0 18px;
    }

    .thinking-bar{
      position:relative;
      width:100%;
      height:10px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,0.10);
      border:1px solid rgba(255,255,255,0.12);
      display:none;
    }

    .thinking-bar.active{
      display:block;
    }

    .thinking-bar::before{
      content:"";
      position:absolute;
      top:0;
      left:-35%;
      width:35%;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
      animation:thinking 1.2s ease-in-out infinite;
    }

    .success-box{
      display:none;
      margin-top:10px;
      padding:18px 20px;
      border-radius:18px;
      background:rgba(184,255,212,0.10);
      border:1px solid rgba(184,255,212,0.25);
      color:var(--success);
      font-weight:700;
      line-height:1.5;
    }

    .success-box.show{
      display:block;
    }

    .footnote{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
      line-height:1.5;
    }

    @keyframes spin{
      to{ transform:rotate(360deg); }
    }

    @keyframes thinking{
      0%{ left:-35%; }
      100%{ left:100%; }
    }

    @media (max-width: 720px){
      .card{
        padding:24px 18px;
        border-radius:20px;
      }

      .grid{
        grid-template-columns:1fr;
      }

      h1{
        font-size:30px;
      }

      .logo-wrap img{
        max-width:180px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">

      <!-- ✅ NEW LOGO -->
      <div class="logo-wrap">
        <img src="ladderlogo2.png" alt="Logo">
      </div>

      <div class="header">
        <div class="eyebrow">Tennis Submission</div>
        <h1>Player Information Form</h1>
        <p class="subtext">
          Fill out the form below. Once submitted, your information will be sent securely to Google Sheets through Google Apps Script.
        </p>
      </div>

      <!-- FORM REMAINS EXACTLY THE SAME -->
