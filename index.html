<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 IndyTennis Summer Ladders</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0c1c31;
      --bg3:#132946;
      --text:#f5f7fb;
      --muted:#b8c4d6;
      --glass:rgba(255,255,255,0.08);
      --glass-strong:rgba(255,255,255,0.12);
      --border:rgba(255,255,255,0.14);
      --accent:#8ee8ff;
      --accent2:#7cffc8;
      --shadow:0 20px 50px rgba(0,0,0,0.35);
      --radius:28px;
      --pill-radius:999px;
      --max-width:900px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:'Inter',sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top left, rgba(142,232,255,0.16), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(124,255,200,0.10), transparent 24%),
        linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg3) 100%);
      overflow-x:hidden;
    }

    .bg-blur{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
    }

    .blob{
      position:absolute;
      border-radius:999px;
      filter:blur(80px);
      opacity:0.22;
    }

    .blob.one{
      width:280px;
      height:280px;
      background:#48bfff;
      top:40px;
      left:-70px;
    }

    .blob.two{
      width:240px;
      height:240px;
      background:#7cffc8;
      top:320px;
      right:-50px;
    }

    .blob.three{
      width:220px;
      height:220px;
      background:#5e7bff;
      bottom:60px;
      left:20%;
    }

    .page{
      position:relative;
      z-index:1;
      width:min(92%, var(--max-width));
      margin:0 auto;
      padding:40px 0 70px;
    }

    .hero{
      background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border:1px solid var(--border);
      border-radius:36px;
      padding:38px 24px 34px;
      text-align:center;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.08), transparent 35%, transparent 65%, rgba(255,255,255,0.04));
      pointer-events:none;
    }

    .logo{
      max-width:220px;
      width:100%;
      height:auto;
      display:block;
      margin:0 auto 22px;
      filter:drop-shadow(0 10px 28px rgba(0,0,0,0.28));
      position:relative;
      z-index:1;
    }

    .eyebrow{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.06);
      color:var(--accent2);
      font-size:0.8rem;
      font-weight:700;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:16px;
      position:relative;
      z-index:1;
    }

    h1{
      font-size:clamp(2.1rem, 5vw, 4.2rem);
      line-height:0.96;
      font-weight:800;
      letter-spacing:-0.04em;
      margin-bottom:14px;
      position:relative;
      z-index:1;
      background:linear-gradient(90deg, #ffffff 0%, #dff5ff 45%, #8ee8ff 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      color:transparent;
    }

    .subtext{
      max-width:640px;
      margin:0 auto;
      color:var(--muted);
      font-size:1rem;
      line-height:1.7;
      position:relative;
      z-index:1;
    }

    .links-section{
      margin-top:26px;
    }

    .pill-list{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .pill-link{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:68px;
      padding:18px 24px;
      text-decoration:none;
      color:var(--text);
      font-size:1rem;
      font-weight:700;
      letter-spacing:0.01em;
      text-align:center;
      border-radius:var(--pill-radius);
      background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border:1px solid var(--border);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      transition:transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .pill-link:hover{
      transform:translateY(-3px);
      border-color:rgba(124,255,200,0.42);
      background:linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.08));
    }

    .pill-link:active{
      transform:translateY(-1px);
    }

    .history-section{
      margin-top:34px;
    }

    .history-card{
      background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border:1px solid var(--border);
      border-radius:32px;
      padding:26px;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .history-label{
      color:var(--accent2);
      font-size:0.8rem;
      font-weight:700;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .history-card h2{
      font-size:clamp(1.5rem, 3vw, 2.15rem);
      letter-spacing:-0.03em;
      margin-bottom:10px;
    }

    .history-card p{
      color:var(--muted);
      line-height:1.65;
      font-size:0.97rem;
      margin-bottom:18px;
    }

    .table-wrap{
      overflow-x:auto;
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(5, 12, 22, 0.28);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:650px;
    }

    thead th{
      text-align:left;
      padding:17px 18px;
      font-size:0.8rem;
      text-transform:uppercase;
      letter-spacing:0.1em;
      color:#9fc7de;
      background:rgba(255,255,255,0.04);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    tbody td{
      padding:17px 18px;
      border-bottom:1px solid rgba(255,255,255,0.07);
      color:#ecf4fc;
      font-size:0.98rem;
    }

    tbody tr:last-child td{
      border-bottom:none;
    }

    tbody tr:hover{
      background:rgba(255,255,255,0.04);
    }

    .loading-row td,
    .empty-row td,
    .error-row td{
      color:var(--muted);
      font-style:italic;
    }

    .footer{
      text-align:center;
      color:rgba(220,233,248,0.72);
      font-size:0.92rem;
      margin-top:26px;
    }

    .footer span{
      color:var(--accent2);
      font-weight:600;
    }

    @media (max-width: 640px){
      .page{
        padding:24px 0 54px;
      }

      .hero{
        padding:30px 18px 26px;
        border-radius:28px;
      }

      .history-card{
        padding:20px;
        border-radius:26px;
      }

      .logo{
        max-width:180px;
      }

      .pill-link{
        min-height:62px;
        padding:16px 18px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blur">
    <div class="blob one"></div>
    <div class="blob two"></div>
    <div class="blob three"></div>
  </div>

  <main class="page">
    <section class="hero">
      <img src="ladderlogo.png" alt="IndyTennis Summer Ladders Logo" class="logo">

      <div class="eyebrow">2026 Season</div>

      <h1>IndyTennis Summer Ladders</h1>

      <p class="subtext">
        
      </p>
    </section>

    <section class="links-section">
      <div class="pill-list">
        <a class="pill-link" href="YOUR-SINGLES-LADDER-LINK-HERE" target="_blank" rel="noopener noreferrer">
          Singles Ladder
        </a>

        <a class="pill-link" href="YOUR-SINGLES-SCORE-SUBMISSION-LINK-HERE" target="_blank" rel="noopener noreferrer">
          Singles Ladder Score Submission
        </a>

        <a class="pill-link" href="YOUR-DOUBLES-LADDER-LINK-HERE" target="_blank" rel="noopener noreferrer">
          Doubles Ladder
        </a>

        <a class="pill-link" href="YOUR-DOUBLES-SCORE-SUBMISSION-LINK-HERE" target="_blank" rel="noopener noreferrer">
          Doubles Ladder Score Submission
        </a>
      </div>
    </section>

    <section class="history-section">
      <div class="history-card">
        <div class="history-label">Champions Archive</div>
        <h2>Historical Winners</h2>
        <p>
          
        </p>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Year</th>
                <th>Singles Champion</th>
                <th>Doubles Champion</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr class="loading-row">
                <td colspan="3">Loading historical winners...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>2026 IndyTennis Summer Ladders</span>
    </footer>
  </main>

  <script>
    /*
      HOW TO USE THE HISTORICAL WINNERS CSV:

      1. Create a Google Sheet with columns:
         A = Year
         B = Singles Champion
         C = Doubles Champion

      2. Publish the sheet to the web as CSV.

      3. Paste the published CSV link below.
         Example:
         https://docs.google.com/spreadsheets/d/e/XXXXXXXXXXXX/pub?output=csv
    */

    const csvUrl = "PASTE-YOUR-GOOGLE-CSV-LINK-HERE";
    const historyBody = document.getElementById("historyBody");

    async function loadHistory() {
      if (!csvUrl || csvUrl.includes("PASTE-YOUR-GOOGLE-CSV-LINK-HERE")) {
        historyBody.innerHTML = `
          <tr class="empty-row">
            <td colspan="3">Add your published Google Sheets CSV link in the code to display historical winners.</td>
          </tr>
        `;
        return;
      }

      try {
        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error("Could not fetch CSV.");

        const csvText = await response.text();
        const rows = parseCSV(csvText);

        if (rows.length <= 1) {
          historyBody.innerHTML = `
            <tr class="empty-row">
              <td colspan="3">No historical winner data found yet.</td>
            </tr>
          `;
          return;
        }

        const dataRows = rows.slice(1).filter(row =>
          row.some(cell => cell && cell.trim() !== "")
        );

        if (!dataRows.length) {
          historyBody.innerHTML = `
            <tr class="empty-row">
              <td colspan="3">No historical winner data found yet.</td>
            </tr>
          `;
          return;
        }

        historyBody.innerHTML = dataRows.map(row => {
          const year = escapeHTML(row[0] || "");
          const singles = escapeHTML(row[1] || "");
          const doubles = escapeHTML(row[2] || "");

          return `
            <tr>
              <td>${year}</td>
              <td>${singles}</td>
              <td>${doubles}</td>
            </tr>
          `;
        }).join("");
      } catch (error) {
        historyBody.innerHTML = `
          <tr class="error-row">
            <td colspan="3">Unable to load historical winners right now.</td>
          </tr>
        `;
        console.error("Historical winners load error:", error);
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      return lines.map(line => {
        const result = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          const nextChar = line[i + 1];

          if (char === '"' && inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            result.push(current);
            current = "";
          } else {
            current += char;
          }
        }

        result.push(current);
        return result;
      });
    }

    function escapeHTML(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadHistory();
  </script>
</body>
</html>
